<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="460" viewBox="0 0 1060 460" role="img" aria-labelledby="title desc">
  <title id="title">Azure Networking Flow</title>
  <desc id="desc">Animated left to right network flow from internet to workloads with NSG, UDR, DNS, and peering callouts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbfdff"/>
      <stop offset="100%" stop-color="#edf6ff"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#118dff"/>
      <stop offset="100%" stop-color="#0a5ea8"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1e4d7a"/>
    </marker>
  </defs>
  <rect width="1060" height="460" fill="url(#bg)"/>
  <text x="530" y="40" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#143a66">Azure Networking Flow</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="18" text-anchor="middle" fill="#fff">
    <g transform="translate(50,120)"><rect width="170" height="78" rx="12" fill="url(#node)"/><text x="85" y="45" font-weight="700">Internet</text></g>
    <g transform="translate(250,120)"><rect width="170" height="78" rx="12" fill="url(#node)"/><text x="85" y="45" font-weight="700">Public IP</text></g>
    <g transform="translate(450,120)"><rect width="190" height="78" rx="12" fill="url(#node)"/><text x="95" y="45" font-weight="700">LB / App GW</text></g>
    <g transform="translate(680,120)"><rect width="150" height="78" rx="12" fill="url(#node)"/><text x="75" y="45" font-weight="700">Subnet</text></g>
    <g transform="translate(860,120)"><rect width="150" height="78" rx="12" fill="url(#node)"/><text x="75" y="45" font-weight="700">VM / App</text></g>
  </g>

  <g stroke="#1e4d7a" stroke-width="4" marker-end="url(#arrow)">
    <line x1="220" y1="159" x2="245" y2="159"/>
    <line x1="420" y1="159" x2="445" y2="159"/>
    <line x1="640" y1="159" x2="675" y2="159"/>
    <line x1="830" y1="159" x2="855" y2="159"/>
  </g>

  <circle cx="90" cy="159" r="8" fill="#ffb900">
    <animateMotion dur="4.8s" repeatCount="indefinite" path="M0,0 L920,0"/>
  </circle>

  <g font-family="Segoe UI, Arial, sans-serif" fill="#123b64">
    <rect x="90" y="258" width="220" height="62" rx="10" fill="#dceeff" stroke="#6ca8d8"/>
    <text x="105" y="283" font-size="20" font-weight="700">NSG</text><text x="105" y="305" font-size="15">Priority-based traffic filtering</text>

    <rect x="330" y="258" width="220" height="62" rx="10" fill="#dceeff" stroke="#6ca8d8"/>
    <text x="345" y="283" font-size="20" font-weight="700">UDR</text><text x="345" y="305" font-size="15">Override default routes</text>

    <rect x="570" y="258" width="220" height="62" rx="10" fill="#dceeff" stroke="#6ca8d8"/>
    <text x="585" y="283" font-size="20" font-weight="700">Azure DNS</text><text x="585" y="305" font-size="15">Name resolution</text>

    <rect x="810" y="258" width="220" height="62" rx="10" fill="#dceeff" stroke="#6ca8d8"/>
    <text x="825" y="283" font-size="20" font-weight="700">VNet Peering</text><text x="825" y="305" font-size="15">Private, non-transitive connect</text>
  </g>
</svg>
