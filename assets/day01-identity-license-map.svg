<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">AZ-104 Identity License Map</title>
  <desc id="desc">Comparison chart for Free, P1, and P2 Microsoft Entra capabilities for exam prep.</desc>
  <defs>
    <style>
      .bg { fill: #0b1020; }
      .panel { fill: #111827; stroke: #374151; stroke-width: 2; }
      .h { fill: #e5e7eb; font-family: Segoe UI, Arial, sans-serif; font-size: 20px; font-weight: 700; }
      .t { fill: #cbd5e1; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; }
      .free { fill: #1d4ed8; }
      .p1 { fill: #047857; }
      .p2 { fill: #7c3aed; }
      .box { stroke: #93c5fd; stroke-width: 1.5; rx: 8; }
      .label { fill: #f8fafc; font-family: Segoe UI, Arial, sans-serif; font-size: 16px; font-weight: 600; }
      .note { fill: #94a3b8; font-family: Segoe UI, Arial, sans-serif; font-size: 13px; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="980" height="520"/>
  <rect class="panel" x="20" y="20" width="940" height="480" rx="12"/>

  <text class="h" x="40" y="60">AZ-104 Identity Licensing Cheat Sheet</text>
  <text class="t" x="40" y="88">Memory lock: Free = basics, P1 = Conditional Access, P2 = Risk + Privileged Identity.</text>

  <rect class="free box" x="40" y="120" width="280" height="360"/>
  <text class="label" x="60" y="150">Free</text>
  <text class="t" x="60" y="178">• Core identity + RBAC</text>
  <text class="t" x="60" y="204">• SSO, cloud/federated auth</text>
  <text class="t" x="60" y="230">• Basic MFA</text>
  <text class="t" x="60" y="256">• Guest users (basic B2B)</text>
  <text class="t" x="60" y="282">• Managed Identity support</text>
  <text class="note" x="60" y="320">Exam trap: “Require MFA” can still be Free</text>
  <text class="note" x="60" y="340">if not conditional/location/device-based.</text>

  <rect class="p1 box" x="350" y="120" width="280" height="360"/>
  <text class="label" x="370" y="150">P1</text>
  <text class="t" x="370" y="178">• Conditional Access</text>
  <text class="t" x="370" y="204">• Dynamic Groups</text>
  <text class="t" x="370" y="230">• Administrative Units</text>
  <text class="t" x="370" y="256">• App Provisioning (SCIM)</text>
  <text class="t" x="370" y="282">• Full SSPR capabilities</text>
  <text class="note" x="370" y="320">If question says location/device based access,</text>
  <text class="note" x="370" y="340">answer is P1 or higher.</text>

  <rect class="p2 box" x="660" y="120" width="280" height="360"/>
  <text class="label" x="680" y="150">P2</text>
  <text class="t" x="680" y="178">• Risk-based Conditional Access</text>
  <text class="t" x="680" y="204">• Identity Protection</text>
  <text class="t" x="680" y="230">• Privileged Identity Management</text>
  <text class="t" x="680" y="256">• Just-in-time admin elevation</text>
  <text class="note" x="680" y="320">If question says risky user or temporary admin,</text>
  <text class="note" x="680" y="340">answer is P2.</text>
</svg>
